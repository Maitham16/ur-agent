# Bun configuration for Claude Code development
# See https://bun.sh/docs/runtime/bunfig

[run]
# Load the bun:bundle polyfill before the main entry point
preload = ["./plugins/bunBundleDev.ts"]

[define]
# Build-time macros — injected as global constants
"MACRO.VERSION" = '"1.0.0"'
"MACRO.BUILD_TIME" = '""'
"MACRO.PACKAGE_URL" = '"ur-agent"'
"MACRO.NATIVE_PACKAGE_URL" = 'undefined'
"MACRO.FEEDBACK_CHANNEL" = '"https://github.com/Maitham16/ur-agent/issues"'
"MACRO.ISSUES_EXPLAINER" = '"file an issue at https://github.com/Maitham16/ur-agent/issues"'
"MACRO.VERSION_CHANGELOG" = '""'
